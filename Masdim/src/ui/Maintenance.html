<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance - Masprinto</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --bg: #0f172a;
      --accent: #3b82f6;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px;
    }

    .icon {
      font-size: 80px;
      color: var(--accent);
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.3s;
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.5);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.1);
        opacity: 0.8;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">
      <i class="fa-solid fa-screwdriver-wrench"></i>
    </div>
    <h1>Sistem Maintenance</h1>
    <p>Mohon maaf atas ketidaknyamanannya. Saat ini sistem kami sedang dalam pemeliharaan rutin untuk meningkatkan
      kualitas layanan kami.</p>
    <p style="font-size: 14px;">Silakan coba kembali dalam beberapa saat atau hubungi admin jika ada keperluan mendesak.
    </p>
    <a href="https://wa.me/6281231619457" class="btn"><i class="fa-brands fa-whatsapp"></i> Hubungi Admin</a>
    <div class="footer">
      v5.0 | Production Ecosystem
    </div>
  </div>
</body>

</html>
