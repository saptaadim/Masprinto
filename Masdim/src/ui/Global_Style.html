<style>
    :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --text-light: #64748b;
        --border: #e2e8f0;
        --success: #10b981;
        --danger: #ef4444;
        --radius: 16px;
    }

    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    body.scroll-layout {
        overflow-y: auto !important;
        height: auto !important;
        min-height: 100vh;
    }

    /* HEADER */
    header {
        padding: 12px;
        text-align: center;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        z-index: 10;
    }

    header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    /* LAYOUT UTAMA */
    .main-layout {
        display: flex;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
    }

    /* AREA KANVAS KLASIK */
    .canvas-section {
        flex: 1;
        position: relative;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .canvas-wrapper {
        display: none;
    }

    .canvas-wrapper.active {
        display: block;
    }

    /* AREA KONTROL */
    .control-section {
        height: 40vh; /* Reduced from 45vh to give more room for canvas */
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
    }

    @media (min-width: 768px) {
        .main-layout {
            flex-direction: row;
        }

        .control-section {
            height: 100%;
            width: 420px; /* Diperlebar untuk desktop */
            border-top: none;
            border-left: 1px solid var(--border);
        }
    }

    #btnResetZoom {
        position: absolute;
        right: 15px;
        z-index: 50;
        background: rgba(15, 23, 42, 0.8);
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: none;
    }

    /* TABS & PANELS */
    .tab-bar {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: #fdfdfd;
        flex-shrink: 0;
    }

    .tab-item {
        flex: 1;
        padding: 16px 10px;
        text-align: center;
        font-size: 13px; /* Lebih besar di desktop */
        font-weight: 800;
        color: var(--text-light);
        cursor: pointer;
        text-transform: uppercase;
        transition: 0.2s;
        border-bottom: 3px solid transparent;
    }

    .tab-item.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
        background: #f8fafc;
    }

    .tab-content {
        padding: 20px;
        flex: 1;
        overflow-y: auto;
    }

    .step-panel {
        display: none;
    }

    .step-panel.active {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* BUTTONS & UI */
    .btn-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
    }

    button {
        padding: 12px 16px;
        border-radius: 10px;
        border: none;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
        background: var(--primary);
        color: white;
    }

    .btn-outline {
        background: white;
        border: 1.5px solid var(--border);
        color: var(--text);
        flex: 1;
        min-width: 80px;
    }

    .btn-outline.active {
        border-color: var(--primary);
        color: var(--primary);
        background: #f5f3ff;
    }

    .btn-danger {
        background: #fef2f2;
        color: var(--danger);
        border: 1.5px solid #fee2e2;
    }

    .btn-full {
        width: 100%;
        padding: 16px;
    }

    select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        font-family: inherit;
        font-weight: 600;
        outline: none;
        background: var(--bg);
    }

    /* LOADING SCREEN */
    #system-loading {
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.95);
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px;
        text-align: center;
        backdrop-filter: blur(5px);
    }

    .spinner {
        border: 4px solid #f1f5f9;
        border-top: 4px solid var(--primary);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    .result-box {
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 12px;
        padding: 15px;
        margin-top: 10px;
    }

    /* =========================================================
           TAMBAHAN UNTUK GAS2 & GAS3 (FORM ORDER & MITRA)
           ========================================================= */

    /* WARNING COLOR FIX */
    :root {
        --warning: #f59e0b;
    }

    /* CONTAINER FORM (Untuk GAS2 dan GAS3) */
    .container {
        max-width: 800px;
        width: 90%;
        margin: 40px auto;
        padding: 40px;
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        max-height: calc(100vh - 80px);
        position: relative;
    }

    @media (max-width: 768px) {
        /* Mobile specific adjustments for tabs */
        .tab-item {
            padding: 12px 5px;
            font-size: 11px;
        }
        
        .control-section {
            height: 45vh; /* Ruang lebih di mobile */
        }

        .container {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 25px 15px;
            border-radius: 0;
            box-shadow: none;
            max-height: none;
            min-height: 100vh;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 16px;
        }

        .flex-row {
            gap: 10px;
        }

        .flex-1 {
            min-width: 100%;
        }

        .btn-nav {
            flex-direction: column-reverse;
        }

        .btn-nav button {
            width: 100%;
        }

        .dot-label {
            font-size: 8px;
            letter-spacing: 0;
        }

        .progress-wrapper {
            margin-bottom: 40px;
        }
    }

    h1 {
        font-size: 28px;
        font-weight: 800;
        color: var(--text);
        text-align: center;
        margin: 0 0 25px 0;
        letter-spacing: -0.5px;
    }

    h2 {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 20px 0;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* PROGRESS BAR */
    .progress-wrapper {
        position: relative;
        margin: 0 0 40px 0;
        padding: 0 20px;
    }

    .progress-line {
        position: absolute;
        top: 17px;
        left: 30px;
        right: 30px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        z-index: 1;
    }

    .progress-line-fill {
        position: absolute;
        top: 17px;
        left: 30px;
        height: 4px;
        background: var(--primary);
        border-radius: 2px;
        z-index: 2;
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-bar {
        position: relative;
        z-index: 3;
        display: flex;
        justify-content: space-between;
    }

    .dot {
        position: relative;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--surface);
        border: 2px solid var(--border);
        color: var(--text-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 15px;
        transition: all 0.3s ease;
    }

    .dot.active {
        border-color: var(--primary);
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        transform: scale(1.1);
    }

    .dot-label {
        position: absolute;
        top: 100%;
        margin-top: 10px;
        font-size: 10px;
        font-weight: 700;
        color: var(--text-light);
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        pointer-events: none;
    }

    .dot.active .dot-label {
        color: var(--primary);
    }

    /* FORM GROUPS */
    .step {
        display: none;
        animation: stepEnter 0.4s ease;
    }

    @keyframes stepEnter {
        from {
            opacity: 0;
            transform: translateX(10px);
        }

        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .step.active {
        display: block;
    }

    .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    label {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        display: block;
    }

    input,
    textarea {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        font-family: inherit;
        font-weight: 500;
        font-size: 15px;
        outline: none;
        background: var(--surface);
        color: var(--text);
        transition: all 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: var(--primary);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .flex-row {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .flex-1 {
        flex: 1;
        min-width: 200px;
    }

    /* TOMBOL NAVIGASI FORM */
    .btn-nav {
        display: flex;
        justify-content: space-between;
        margin-top: 35px;
        gap: 15px;
    }

    .btn-secondary {
        background: var(--surface);
        color: var(--text);
        border: 1.5px solid var(--border);
    }

    .btn-secondary:hover {
        background: var(--bg);
    }

    .btn-cart {
        background: var(--bg);
        color: var(--primary);
        border: 1.5px dashed var(--primary);
        width: 100%;
        margin-bottom: 20px;
    }

    .btn-cart:hover {
        background: #eef2ff;
    }

    .btn-add {
        background: var(--primary);
        color: white;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 42px;
        border: none;
        cursor: pointer;
    }

    /* INFO BOXES */
    .info-box {
        padding: 12px 15px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 20px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .info-blue {
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1e3a8a;
    }

    .info-yellow {
        background: #fffbeb;
        border: 1px solid #fde68a;
        color: #92400e;
    }

    .info-red {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
    }

    .info-box a {
        color: inherit;
        font-weight: 700;
        text-decoration: underline;
    }

    /* KOMPONEN SPESIFIK GAS2 & GAS3 */
    .cart-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
    }

    .total-display {
        font-size: 18px;
        font-weight: 800;
        color: var(--primary);
        text-align: right;
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
    }

    .success-box,
    .customizer-banner {
        background: #ecfdf5;
        border: 1.5px solid var(--success);
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 20px;
    }

    .success-box .title {
        color: #059669;
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 5px;
    }

    .success-box .desc {
        font-size: 12px;
        color: #065f46;
        margin-bottom: 15px;
    }

    .success-box a,
    .customizer-banner a {
        display: inline-block;
        background: var(--success);
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 13px;
        font-weight: bold;
        transition: 0.2s;
    }

    .blue-card {
        background: linear-gradient(135deg, #1e3a8a, #3b82f6);
        color: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
    }

    .blue-card .sub {
        font-size: 12px;
        opacity: 0.9;
        margin-bottom: 10px;
    }

    .blue-card .row {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-bottom: 8px;
    }

    .blue-card .price-main {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 8px;
        margin-top: 15px;
        text-align: center;
        font-size: 24px;
        font-weight: 800;
    }

    .sablon-pintar {
        background: #eff6ff;
        border: 1.5px dashed var(--primary);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .sablon-pintar .title {
        color: var(--primary);
        font-weight: 700;
        margin-bottom: 10px;
    }

    .sablon-pintar .box {
        background: white;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #bfdbfe;
        font-family: monospace;
        font-weight: bold;
        color: #1e3a8a;
    }

    .sla-container {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        background: #fffbeb;
        border: 1px solid #fef08a;
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
        cursor: pointer;
    }

    .sla-container input {
        width: 20px;
        height: 20px;
        margin-top: 2px;
        flex-shrink: 0;
    }

    .sla-container span {
        font-size: 13px;
        line-height: 1.5;
        color: #92400e;
    }

    .price-preview {
        background: var(--surface);
        padding: 15px;
        border-radius: 10px;
        border: 1px solid var(--border);
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
    }

    /* GLOBAL TOAST */
    #toast-wrap {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 3000;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }

    .toast-item {
        background: #0f172a;
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(2, 6, 23, 0.25);
        font-size: 13px;
        max-width: 320px;
        pointer-events: auto;
    }

    .toast-item.warn {
        background: #92400e;
    }

    .toast-item.error {
        background: #991b1b;
    }

    .toast-item.success {
        background: #065f46;
    }

    /* GLOBAL CONFIRM */
    #confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 3200;
        padding: 16px;
    }

    #confirm-box {
        background: #fff;
        border-radius: 14px;
        width: 100%;
        max-width: 360px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.25);
        border: 1px solid var(--border);
    }

    #confirm-message {
        font-size: 14px;
        color: var(--text);
        margin-bottom: 14px;
    }
    #confirm-icon {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        margin-bottom: 10px;
        font-weight: 800;
    }
    #confirm-icon i {
        font-size: 15px;
    }
    #confirm-overlay[data-type="danger"] #confirm-icon {
        background: #fee2e2;
        color: #991b1b;
    }
    #confirm-overlay[data-type="warning"] #confirm-icon {
        background: #fef3c7;
        color: #92400e;
    }
    #confirm-overlay[data-type="info"] #confirm-icon {
        background: #dbeafe;
        color: #1d4ed8;
    }

    #confirm-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
    }

    #confirm-actions button {
        padding: 9px 12px;
        border-radius: 8px;
        border: none;
        font-weight: 700;
        cursor: pointer;
    }

    #confirm-cancel {
        background: #e2e8f0;
        color: #0f172a;
    }

    #confirm-ok {
        background: var(--primary);
        color: #fff;
    }
</style>
