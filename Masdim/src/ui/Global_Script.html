<script>
  window.masprintoToast = function (message, type) {
    const wrap = document.getElementById('toast-wrap');
    if (!wrap) return;
    const el = document.createElement('div');
    el.className = 'toast-item ' + (type || '');
    el.innerText = String(message || '');
    wrap.appendChild(el);
    setTimeout(() => {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, 2800);
  };

  window.masprintoAlert = function (msg) {
    const text = String(msg || '');
    if (/gagal|error|ditolak|tidak valid|kadaluwarsa/i.test(text)) return window.masprintoToast(text, 'error');
    if (/berhasil|sukses|tersimpan|dikirim/i.test(text)) return window.masprintoToast(text, 'success');
    return window.masprintoToast(text, 'warn');
  };
</script>
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-icon">?</div>
    <div id="confirm-message">Apakah Anda yakin?</div>
    <div id="confirm-actions">
      <button id="confirm-cancel" type="button">Batal</button>
      <button id="confirm-ok" type="button">Lanjut</button>
    </div>
  </div>
</div>
<script>
  window.masprintoConfirm = function (message, onYes, options) {
    const overlay = document.getElementById('confirm-overlay');
    const msgEl = document.getElementById('confirm-message');
    const iconEl = document.getElementById('confirm-icon');
    const okBtn = document.getElementById('confirm-ok');
    const cancelBtn = document.getElementById('confirm-cancel');
    if (!overlay || !msgEl || !iconEl || !okBtn || !cancelBtn) return;
    const opts = options || {};

    const close = () => {
      overlay.style.display = 'none';
      okBtn.onclick = null;
      cancelBtn.onclick = null;
      overlay.onclick = null;
    };

    msgEl.innerText = String(message || 'Apakah Anda yakin?');
    overlay.setAttribute('data-type', opts.type || 'info');
    const fallbackIcon = (opts.type === 'danger')
      ? '<i class="fa-solid fa-triangle-exclamation"></i>'
      : (opts.type === 'warning'
          ? '<i class="fa-solid fa-circle-exclamation"></i>'
          : '<i class="fa-solid fa-circle-info"></i>');
    iconEl.innerHTML = opts.iconHtml || fallbackIcon;
    okBtn.innerText = opts.okText || 'Lanjut';
    cancelBtn.innerText = opts.cancelText || 'Batal';
    overlay.style.display = 'flex';
    cancelBtn.onclick = close;
    overlay.onclick = (e) => { if (e.target === overlay) close(); };
    okBtn.onclick = () => {
      close();
      if (typeof onYes === 'function') onYes();
    };
  };
</script>
